<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>루아 (Ruach) | Inhyuk Jung</title>
    <link rel="stylesheet" href="../style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        .app-header {
            padding-top: 150px;
            padding-bottom: 50px;
        }

        .back-link {
            display: inline-block;
            margin-bottom: 2rem;
            opacity: 0.6;
            transition: all 0.3s;
        }

        .back-link:hover {
            opacity: 1;
            transform: translateX(-5px);
        }

        .app-content {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 3rem;
        }

        .app-image {
            width: 100%;
            height: 400px;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 2rem;
        }

        .tag {
            background: var(--glass-bg);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            font-size: 0.8rem;
            border: 1px solid var(--glass-border);
            margin-right: 0.5rem;
            margin-bottom: 0.5rem;
            display: inline-block;
        }

        @media (max-width: 768px) {
            .app-content {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>
    <nav>
        <div class="container nav-content">
            <div class="logo"><a href="../index.html">INHYUK.LOG</a></div>
            <div class="nav-links"><a href="../index.html#projects">Back to Projects</a></div>
        </div>
    </nav>
    <main class="container">
        <header class="app-header reveal">
            <a href="../index.html" class="back-link">← Back to Portfolio</a>
            <h1>루아 (Ruach)</h1>
            <p style="color: var(--text-secondary); margin-top: 1rem; font-size: 1.2rem;">신앙 습관 만들기</p>
        </header>
        <div class="app-content reveal">
            <div>
                <div class="app-image"><span style="opacity: 0.3;">App Preview / Screenshot</span></div>
                <article style="color: var(--text-secondary); line-height: 1.8;">
                    <h2>Summary</h2>
                    <p style="margin: 1.5rem 0;"> 건강하고 지속 가능한 신앙 습관을 형성할 수 있도록 돕는 서비스입니다. </p>
                </article>
            </div>
            <aside>
                <div class="card">
                    <h3>Information</h3>
                    <div style="margin-top: 1.5rem;">
                        <p style="font-size: 0.9rem; margin-bottom: 0.5rem;">Links</p>
                        <a href="https://play.google.com/store/apps/details?id=org.god.Ruach" target="_blank"
                            style="color: var(--accent-color); text-decoration: underline;">Google Play
                            (Android)</a><br>
                        <a href="https://apps.apple.com/us/app/%EB%A3%A8%EC%95%84-%EC%8B%A0%EC%95%99-%EC%8A%B5%EA%B4%80-%EB%A7%8C%EB%93%A4%EA%B8%B0/id6757080533"
                            target="_blank" style="color: var(--accent-color); text-decoration: underline;">App Store
                            (iOS)</a>
                    </div>
                </div>
            </aside>
        </div>
    </main>
    <footer style="margin-top: 100px;">
        <div class="container">
            <p>&copy; 2026 Jung Inhyuk. Built with passion.</p>
        </div>
    </footer>
    <script src="../main.js"></script>
</body>

</html>
